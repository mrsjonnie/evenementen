name: Update evenementen

on:
  workflow_dispatch:
    inputs:
      region:
        description: Regio om te scannen
        required: false
        default: Groningen
      radius:
        description: Straal in km
        required: false
        default: '0'
      category:
        description: Type activiteit
        required: false
        default: all
      query:
        description: Zoekterm
        required: false
        default: ''
      dateFrom:
        description: Startdatum
        required: false
        default: ''
      dateTo:
        description: Einddatum
        required: false
        default: ''
      minResults:
        description: Minimum aantal resultaten
        required: false
        default: '20'
      maxEventsPerSite:
        description: Maximum aantal evenementen per website
        required: false
        default: '20'
      siteTimeLimitSeconds:
        description: Maximale zoektijd per website in seconden
        required: false
        default: '20'
      sites:
        description: Extra websites als JSON-lijst
        required: false
        default: '[]'
      providers:
        description: AI-bronnen als JSON
        required: false
        default: '{}'
      serpApiLinks:
        description: Door SerpAPI gevonden links als JSON-lijst
        required: false
        default: '[]'
      serpApiRawLog:
        description: Ruwe SerpAPI-resultaten als JSON-lijst
        required: false
        default: '[]'
      serpApiEvents:
        description: Door SerpAPI gevonden event-kandidaten als JSON-lijst
        required: false
        default: '[]'
      clearArchive:
        description: Leeg actieve data en archief voor het scrapen
        required: false
        default: 'false'
  push:
    paths:
      - refresh-request.json
  schedule:
    # Vrijdagochtend Nederlandse tijd: 08:00 zomertijd, 07:00 wintertijd.
    - cron: '0 6 * * 5'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Prepare scraper input
        run: |
          python - <<'PY'
          import json
          import os

          defaults = {
              "region": "Groningen",
              "radius": "0",
              "category": "all",
              "query": "",
              "dateFrom": "",
              "dateTo": "",
              "minResults": "20",
              "maxEventsPerSite": "20",
              "siteTimeLimitSeconds": "20",
              "sites": "[]",
              "providers": "{}",
              "serpApiLinks": "[]",
              "serpApiRawLog": "[]",
              "serpApiEvents": "[]",
              "clearArchive": "false",
          }

          event = {}
          event_path = os.environ.get("GITHUB_EVENT_PATH")
          if event_path and os.path.exists(event_path):
              with open(event_path, encoding="utf-8") as handle:
                  event = json.load(handle)

          values = dict(defaults)
          values.update(event.get("inputs") or {})

          if os.path.exists("refresh-request.json"):
              with open("refresh-request.json", encoding="utf-8") as handle:
                  request = json.load(handle)
              for key in defaults:
                  if key in request:
                      values[key] = request[key]

          mapping = {
              "region": "INPUT_REGION",
              "radius": "INPUT_RADIUS",
              "category": "INPUT_CATEGORY",
              "query": "INPUT_QUERY",
              "dateFrom": "INPUT_DATE_FROM",
              "dateTo": "INPUT_DATE_TO",
              "minResults": "INPUT_MIN_RESULTS",
              "maxEventsPerSite": "INPUT_MAX_EVENTS_PER_SITE",
              "siteTimeLimitSeconds": "INPUT_SITE_TIME_LIMIT_SECONDS",
              "sites": "INPUT_SITES",
              "providers": "INPUT_PROVIDERS",
              "serpApiLinks": "INPUT_SERPAPI_LINKS",
              "serpApiRawLog": "INPUT_SERPAPI_RAW_LOG",
              "serpApiEvents": "INPUT_SERPAPI_EVENTS",
              "clearArchive": "INPUT_CLEAR_ARCHIVE",
          }

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for key, env_name in mapping.items():
                  value = values.get(key, defaults[key])
                  if isinstance(value, (list, dict)):
                      value = json.dumps(value)
                  env_file.write(f"{env_name}={value}\n")
          PY

      - name: Run scraper
        run: python scrape_and_email.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json scrape_log.txt
          git diff --cached --quiet || git commit -m "Auto update events.json"
          git push
