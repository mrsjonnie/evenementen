name: Update evenementen

on:
  workflow_dispatch:
  schedule:
    # Vrijdagochtend Nederlandse tijd: 08:00 zomertijd, 07:00 wintertijd.
    - cron: '0 6 * * 5'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        env:
          INPUT_REGION: Groningen
        run: python scrape_and_email.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json scrape_log.txt
          git diff --cached --quiet || git commit -m "Auto update events.json"
          git push
