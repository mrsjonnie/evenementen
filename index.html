<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evenementen rond Groningen</title>
  <style>
    :root {
      --bg: #0e141b;
      --surface: #151f2b;
      --surface-soft: #1d2a38;
      --ink: #edf5ff;
      --muted: #9db0c5;
      --line: #2d4054;
      --primary: #53b6d2;
      --primary-dark: #8bd8ed;
      --accent: #d55f3f;
      --good: #72d6a1;
      --warn: #f0bd62;
      --danger: #ff8d80;
      --shadow: 0 18px 38px rgba(0, 0, 0, .32);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(23, 107, 135, .28);
      outline-offset: 2px;
    }

    .hero {
      color: #fff;
      background:
        linear-gradient(90deg, rgba(7, 17, 27, .92), rgba(14, 29, 42, .54)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=82") center/cover;
    }

    .heroInner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 760px;
      color: rgba(255, 255, 255, .84);
      font-weight: 700;
      line-height: 1.45;
    }

    .weather {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 560px;
    }

    .versionBadge {
      display: inline-flex;
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, .32);
      border-radius: 999px;
      padding: 5px 9px;
      color: rgba(255, 255, 255, .88);
      background: rgba(255, 255, 255, .13);
      font-size: .76rem;
      font-weight: 900;
    }

    .pill {
      border: 1px solid rgba(255, 255, 255, .34);
      background: rgba(255, 255, 255, .16);
      color: #fff;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .82rem;
      font-weight: 800;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .weatherPanel {
      display: none;
      width: 100%;
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, .26);
      border-radius: var(--radius);
      background: rgba(8, 18, 28, .78);
      padding: 10px;
      color: rgba(255, 255, 255, .9);
      font-size: .86rem;
      font-weight: 750;
      line-height: 1.45;
    }

    .weatherPanel.open { display: block; }

    .weatherPanel a { color: #bdefff; font-weight: 950; }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 16px 44px;
    }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.7fr 1fr .8fr 1fr 1fr 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      color: var(--primary-dark);
      font-weight: 900;
      font-size: .82rem;
    }

    input,
    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #101925;
      color: var(--ink);
      padding: 0 11px;
      font-weight: 700;
    }

    input::placeholder { color: #788da3; }

    .btn {
      min-height: 42px;
      border: 0;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 13px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .btnPrimary { background: var(--primary); color: #fff; }
    .btnPrimary:hover { background: var(--primary-dark); }
    .btnSecondary { background: var(--surface-soft); color: var(--primary-dark); }
    .btnDanger { background: #311b19; color: var(--danger); border: 1px solid #6b3a34; }
    .btn[disabled] { opacity: .58; cursor: not-allowed; }

    .secondRow {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding-top: 12px;
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--primary-dark);
      font-size: .84rem;
      font-weight: 900;
      user-select: none;
    }

    .check input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .siteSelect {
      position: relative;
      min-width: 320px;
      flex: 1;
      max-width: 560px;
    }

    .siteSelectLabel {
      display: block;
      margin: 0 0 5px;
      color: var(--primary-dark);
      font-weight: 900;
      font-size: .82rem;
    }

    .siteButton {
      width: 100%;
      justify-content: space-between;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-weight: 850;
      padding-inline: 12px;
    }

    .sitePanel {
      position: absolute;
      z-index: 10;
      top: 68px;
      left: 0;
      right: 0;
      display: none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .siteSelect.open .sitePanel { display: block; }

    .sitePanelHeader {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
      line-height: 1.35;
      background: #101925;
    }

    .siteList {
      display: grid;
      gap: 4px;
      max-height: 260px;
      overflow: auto;
      padding: 8px;
    }

    .siteList label {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      padding: 9px 10px;
      border-radius: var(--radius);
      color: var(--ink);
      font-size: .88rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .siteList label:hover { background: var(--surface-soft); }

    .siteList input {
      width: 16px;
      height: 16px;
      margin: 2px 0 0;
    }

    .siteList span {
      overflow-wrap: anywhere;
    }

    .siteActions {
      display: flex;
      gap: 8px;
      padding: 8px;
      border-top: 1px solid var(--line);
      background: #101925;
    }

    .status {
      display: none;
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-weight: 800;
      line-height: 1.4;
    }

    .status.show { display: block; }
    .status.ok { color: var(--good); border-color: #32634b; background: #12291e; }
    .status.warn { color: var(--warn); border-color: #6f5223; background: #2a2112; }
    .status.error { color: var(--danger); border-color: #733a33; background: #2c1817; }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin: 18px 2px 12px;
    }

    .summary strong {
      color: var(--primary-dark);
      font-size: 1.05rem;
    }

    .summary span {
      color: var(--muted);
      font-weight: 750;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    @media (min-width: 1180px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    .card {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .24);
      display: flex;
      flex-direction: column;
    }

    .typeHeader {
      min-height: 74px;
      background: var(--surface-soft) center/cover;
      position: relative;
      display: flex;
      align-items: end;
      padding: 10px 12px;
      text-decoration: none;
    }

    .typeHeader::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(16, 32, 51, .62), rgba(16, 32, 51, .10));
    }

    .typeHeader span {
      position: relative;
      z-index: 1;
      color: #fff;
      font-weight: 950;
      font-size: .84rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .typeHeaderLink:hover span,
    .sourceLink:hover {
      text-decoration: underline;
    }

    .cardBody {
      padding: 13px;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--surface-soft);
      color: var(--primary-dark);
      font-weight: 900;
      font-size: .76rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-decoration: none;
    }

    .tagAccent {
      background: #341d18;
      color: var(--accent);
    }

    .title {
      margin: 0;
      color: var(--ink);
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .details {
      display: grid;
      gap: 6px;
      color: #c9d6e6;
      font-size: .9rem;
      font-weight: 780;
    }

    .detail {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .detail span:last-child {
      overflow-wrap: anywhere;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: .9rem;
      font-weight: 650;
    }

    .cardActions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }

    .routeInfo {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      color: var(--muted);
      font-weight: 850;
      font-size: .86rem;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 28px;
      background: var(--surface);
      border: 1px dashed #3b5269;
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.5;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .pageText {
      min-width: 118px;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
    }

    @media (max-width: 1120px) {
      .filters { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .heroInner { grid-template-columns: 1fr; }
      .weather { justify-content: flex-start; }
    }

    @media (max-width: 680px) {
      .heroInner { padding-top: 20px; }
      h1 { font-size: 1.55rem; }
      .filters { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .siteSelect { min-width: 100%; max-width: none; }
      .btn { width: 100%; }
      .checks { width: 100%; }
      .check { flex: 1; justify-content: center; }
      .pagination .btn { width: auto; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="heroInner">
      <div>
        <h1 id="pageTitle">Evenementen rond Groningen</h1>
        <p class="subtitle" id="pageSubtitle">Vind snel wat er te doen is, filter op datum en type, en ververs de lijst wanneer je nieuwe resultaten wilt ophalen.</p>
        <span class="versionBadge" id="versionBadge">Versie wordt geladen</span>
      </div>
      <div class="weather" id="weatherBox" aria-live="polite"></div>
    </div>
  </header>

  <main>
    <section class="toolbar" aria-label="Filters">
      <div class="filters">
        <div class="field">
          <label for="search">Zoeken</label>
          <input id="search" type="search" placeholder="Naam, plaats of omschrijving">
        </div>

        <div class="field">
          <label for="region">Regio</label>
          <input id="region" value="Groningen">
        </div>

        <div class="field">
          <label for="radius">Straal</label>
          <input id="radius" type="number" min="1" max="300" value="100" inputmode="numeric">
        </div>

        <div class="field">
          <label for="typeFilter">Type</label>
          <select id="typeFilter">
            <option value="all">Alle types</option>
          </select>
        </div>

        <div class="field">
          <label for="dateSingle">Startdatum</label>
          <input id="dateSingle" type="date">
        </div>

        <div class="field">
          <label for="periodMode">Periode</label>
          <select id="periodMode">
            <option value="day">Alleen deze dag</option>
            <option value="thisWeekend">Dit weekend</option>
            <option value="nextWeekend">Volgend weekend</option>
            <option value="week" selected>7 dagen</option>
          </select>
        </div>

        <button class="btn btnPrimary" id="refreshBtn" type="button">Ververs</button>
        <button class="btn btnSecondary" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="secondRow">
        <div class="checks" aria-label="Aanbieders">
          <label class="check"><input type="checkbox" id="provPerplexity"> Perplexity</label>
          <label class="check"><input type="checkbox" id="provMistral"> Mistral</label>
          <label class="check"><input type="checkbox" id="provOpenAI"> ChatGPT</label>
        </div>

        <div class="siteSelect" id="siteSelect">
          <label class="siteSelectLabel" for="siteButton">Websites om te scannen</label>
          <button class="btn btnSecondary siteButton" id="siteButton" type="button" aria-expanded="false">
            <span><span id="siteCount">0</span> websites geselecteerd</span>
            <span aria-hidden="true">v</span>
          </button>
          <div class="sitePanel">
            <div class="sitePanelHeader">Kies welke websites worden meegenomen bij het ophalen van nieuwe evenementen.</div>
            <div class="siteList" id="sitesList"></div>
            <div class="siteActions">
              <button class="btn btnSecondary" id="allSitesBtn" type="button">Alles</button>
              <button class="btn btnSecondary" id="noSitesBtn" type="button">Geen</button>
            </div>
          </div>
        </div>

        <button class="btn btnDanger" id="clearBtn" type="button">Alles verwijderen</button>
      </div>

      <div class="status" id="status" aria-live="polite"></div>
    </section>

    <div class="summary">
      <strong id="count">Evenementen laden...</strong>
      <span id="metaInfo">Een moment geduld</span>
    </div>

    <section class="grid" id="grid" aria-live="polite"></section>

    <nav class="pagination" id="pagination" aria-label="Paginering">
      <button class="btn btnSecondary" id="prevPage" type="button">Vorige</button>
      <span class="pageText" id="pageInfo">Pagina 1 van 1</span>
      <button class="btn btnSecondary" id="nextPage" type="button">Volgende</button>
    </nav>
  </main>

  <script>
    const APP_VERSION = "2026.06.07.5";
    const WORKER_URL = "https://evenementen-refresh.mrsjonnie.workers.dev";
    const eventsPerPage = 9;
    const typeImages = {
      film: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=900&q=80",
      museum: "https://images.unsplash.com/photo-1566127992631-137a642a90f4?auto=format&fit=crop&w=900&q=80",
      historie: "https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=900&q=80",
      muziek: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=900&q=80",
      theater: "https://images.unsplash.com/photo-1503095396549-807759245b35?auto=format&fit=crop&w=900&q=80",
      markt: "https://images.unsplash.com/photo-1488459716781-31db52582fe9?auto=format&fit=crop&w=900&q=80",
      festival: "https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&w=900&q=80",
      sport: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?auto=format&fit=crop&w=900&q=80",
      culinair: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80",
      kinderen: "https://images.unsplash.com/photo-1516627145497-ae6968895b74?auto=format&fit=crop&w=900&q=80",
      natuur: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=900&q=80",
      workshop: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=900&q=80",
      lezing: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=900&q=80",
      default: "https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=900&q=80"
    };
    const fallbackEvents = [
      {
        title: "Groninger Museum",
        type: "museum",
        date: "Hele jaar",
        location: "Groningen",
        cost: "Zie website",
        description: "Moderne kunst en wisselende tentoonstellingen.",
        image: "https://picsum.photos/seed/Groninger+Museum/800/500",
        website: "https://www.groningermuseum.nl",
        source: "Manual",
        periodLabel: "Hele jaar",
        isPermanent: true
      },
      {
        title: "Fort Bourtange",
        type: "historie",
        date: "Hele jaar",
        location: "Bourtange",
        cost: "Zie website",
        description: "Historische vesting met demonstraties en musea.",
        image: "https://picsum.photos/seed/Fort+Bourtange/800/500",
        website: "https://www.bourtange.nl",
        source: "Manual",
        periodLabel: "Hele jaar",
        isPermanent: true
      }
    ];

    let events = [];
    let sites = [];
    let filteredEvents = [];
    let currentPage = 1;
    let dateFrom = "";
    let dateTo = "";

    const $ = (id) => document.getElementById(id);
    const controls = ["search", "region", "radius", "typeFilter", "dateSingle", "periodMode"];

    function cleanText(value) {
      return String(value ?? "")
        .replace(/\u00c3\u00a2\u00c2\u0082\u00c2\u00ac|\u00e2\u0082\u00ac|\u20ac/g, "EUR")
        .replace(/\u00c2\u00b7|\u00b7/g, "-")
        .replace(/\u00c2\u00b0C|\u00b0C/g, " graden")
        .trim();
    }

    function escapeHtml(value) {
      return cleanText(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function safeUrl(value, options = {}) {
      try {
        let raw = cleanText(value);
        if (!raw || raw === "#") return "";
        if (!/^[a-z][a-z0-9+.-]*:/i.test(raw) && /^[\w.-]+\.[a-z]{2,}/i.test(raw)) {
          raw = `https://${raw}`;
        }
        const url = new URL(raw, window.location.href);
        const allowed = options.mail ? ["http:", "https:", "mailto:"] : ["http:", "https:"];
        if (!allowed.includes(url.protocol)) return "";
        if (options.website && (!url.hostname || !url.hostname.includes("."))) return "";
        return url.href;
      } catch {
        return "";
      }
    }

    function normalizeEventTitle(value) {
      return cleanText(value)
        .toLowerCase()
        .replace(/\b20\d{2}\b/g, "")
        .replace(/^(concert|theater|film|bioscoop|markt|workshop|event|evenement):\s*/i, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function eventDedupeKey(event) {
      const title = normalizeEventTitle(event.title);
      const date = cleanText(event.date || "");
      const location = cleanText(event.location || "").toLowerCase()
        .replace(/\b(start|startpunt|bij|diverse|locaties|locatie)\b/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
      return title.length > 8 ? `${date}|${title}` : `${date}|${title}|${location}`;
    }

    function eventQuality(event) {
      let score = 0;
      if (safeUrl(event.website, { website: true })) score += 12;
      if (safeUrl(event.image)) score += 4;
      if (event.description && cleanText(event.description).length > 60) score += 4;
      if (event.time) score += 2;
      if (event.lat && event.lon) score += 2;
      if (event.source && !/onbekend|manual/i.test(event.source)) score += 1;
      return score;
    }

    function dedupeEvents(items) {
      const byKey = new Map();
      for (const event of items || []) {
        const key = eventDedupeKey(event);
        const current = byKey.get(key);
        if (!current || eventQuality(event) > eventQuality(current)) {
          byKey.set(key, event);
        }
      }
      return [...byKey.values()];
    }

    function typeImage(type, image) {
      const key = cleanText(type).toLowerCase();
      const explicit = safeUrl(image);
      return typeImages[key] || explicit || typeImages.default;
    }

    const regionCoords = {
      groningen: { lat: 53.2194, lon: 6.5665 },
      assen: { lat: 52.9928, lon: 6.5642 },
      drachten: { lat: 53.1125, lon: 6.0989 },
      leeuwarden: { lat: 53.2012, lon: 5.7999 },
      winschoten: { lat: 53.1442, lon: 7.0347 },
      veendam: { lat: 53.1067, lon: 6.8792 },
      appingedam: { lat: 53.3217, lon: 6.8583 }
    };

    const knownLocationCoords = {
      "grote markt": { lat: 53.2189, lon: 6.5685 },
      "forum groningen": { lat: 53.2186, lon: 6.5713 },
      "groninger museum": { lat: 53.2124, lon: 6.5654 },
      "martinikerk": { lat: 53.2191, lon: 6.5683 },
      "oosterpoort": { lat: 53.2129, lon: 6.5741 },
      "vera": { lat: 53.2164, lon: 6.5688 },
      "noorderplantsoen": { lat: 53.2241, lon: 6.5574 },
      "stadspark": { lat: 53.2078, lon: 6.5382 },
      "prinsentuin": { lat: 53.2211, lon: 6.5688 },
      "suikerterrein": { lat: 53.2105, lon: 6.5344 },
      "dot groningen": { lat: 53.2253, lon: 6.5672 },
      "grand theatre": { lat: 53.2183, lon: 6.5686 },
      "martiniplaza": { lat: 53.1993, lon: 6.5540 },
      "bourtange": { lat: 53.0066, lon: 7.1923 }
    };

    function normalizeRouteText(value) {
      return cleanText(value)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function regionCoord() {
      const region = normalizeRouteText($("region")?.value || "Groningen");
      if (regionCoords[region]) return regionCoords[region];
      const match = Object.entries(regionCoords).find(([name]) => region.includes(name) || name.includes(region));
      return match ? match[1] : regionCoords.groningen;
    }

    function eventCoords(event) {
      const lat = Number(event.lat);
      const lon = Number(event.lon);
      if (Number.isFinite(lat) && Number.isFinite(lon)) return { lat, lon };

      const text = normalizeRouteText(`${event.title || ""} ${event.location || ""}`);
      const known = Object.entries(knownLocationCoords).find(([name]) => text.includes(name));
      if (known) return known[1];

      const city = Object.entries(regionCoords).find(([name]) => text.includes(name));
      return city ? city[1] : null;
    }

    function distanceKm(from, to) {
      const earthKm = 6371;
      const lat1 = from.lat * Math.PI / 180;
      const lat2 = to.lat * Math.PI / 180;
      const dLat = (to.lat - from.lat) * Math.PI / 180;
      const dLon = (to.lon - from.lon) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return earthKm * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatKm(km) {
      const rounded = km < 10 ? km.toFixed(1) : String(Math.round(km));
      return rounded.replace(".", ",");
    }

    function routeEstimate(event) {
      const destination = eventCoords(event);
      if (!destination) return "afstand onbekend";
      const roadKm = Math.max(.2, distanceKm(regionCoord(), destination) * 1.25);
      const speed = roadKm < 8 ? 28 : 55;
      const minutes = Math.max(4, Math.round((roadKm / speed) * 60));
      return `${formatKm(roadKm)} km - ca. ${minutes} min`;
    }

    function routeUrl(event) {
      const destination = eventCoords(event);
      if (destination) {
        const origin = regionCoord();
        return `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lon}&destination=${destination.lat},${destination.lon}`;
      }

      const link = safeUrl(event.locationLink);
      if (link) return link;

      const location = cleanText(event.location);
      return location ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}` : "";
    }

    function formatDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function prettyDate(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value || "")) return value || "Datum onbekend";
      return new Intl.DateTimeFormat("nl-NL", {
        weekday: "short",
        day: "numeric",
        month: "short"
      }).format(new Date(value + "T00:00:00"));
    }

    function getWeekendRange(offsetWeeks = 0) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      today.setDate(today.getDate() + offsetWeeks * 7);
      const diffToFriday = (5 - today.getDay() + 7) % 7;
      const friday = new Date(today);
      friday.setDate(today.getDate() + diffToFriday);
      const sunday = new Date(friday);
      sunday.setDate(friday.getDate() + 2);
      return { from: formatDate(friday), to: formatDate(sunday) };
    }

    function updateDateRange() {
      const mode = $("periodMode").value;
      const baseDate = $("dateSingle").value;

      if (mode === "thisWeekend" || mode === "nextWeekend") {
        const range = getWeekendRange(mode === "nextWeekend" ? 1 : 0);
        dateFrom = range.from;
        dateTo = range.to;
        $("dateSingle").value = range.from;
        return;
      }

      const start = baseDate || formatDate(new Date());
      const startDate = new Date(start + "T00:00:00");
      dateFrom = start;
      dateTo = start;

      if (mode === "week") {
        const end = new Date(startDate);
        end.setDate(startDate.getDate() + 6);
        dateTo = formatDate(end);
      }
    }

    function showStatus(message, type = "") {
      const status = $("status");
      status.className = `status show ${type}`.trim();
      status.textContent = message;
    }

    function hideStatus() {
      $("status").className = "status";
      $("status").textContent = "";
    }

    function setBusy(button, busy, text) {
      button.disabled = busy;
      button.dataset.originalText ||= button.textContent;
      button.textContent = busy ? text : button.dataset.originalText;
    }

    const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function eventSignature(items) {
      return JSON.stringify(items.map((event) => [
        event.title || "",
        event.date || "",
        event.location || "",
        event.website || ""
      ]).slice(0, 250));
    }

    async function fetchEvents() {
      const response = await fetch(`./events.json?_=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error("events.json kon niet worden geladen");
      const data = await response.json();
      if (Array.isArray(data)) return dedupeEvents(data);
      if (data && Array.isArray(data.events)) return dedupeEvents(data.events);
      throw new Error("events.json heeft geen geldige lijst");
    }

    async function loadJson(path, fallback) {
      try {
        const response = await fetch(`${path}?_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} kon niet worden geladen`);
        const data = await response.json();
        if (path.includes("events.json")) {
          if (Array.isArray(data)) return dedupeEvents(data);
          if (data && Array.isArray(data.events)) return dedupeEvents(data.events);
        }
        if (Array.isArray(data)) return data;
        return fallback;
      } catch {
        return fallback;
      }
    }

    async function waitForUpdatedEvents(previousSignature) {
      for (let attempt = 1; attempt <= 18; attempt += 1) {
        showStatus(`Nieuwe lijst wordt opgehaald bij GitHub Pages... poging ${attempt} van 18`, "warn");
        await delay(10000);

        try {
          const freshEvents = await fetchEvents();
          if (eventSignature(freshEvents) !== previousSignature) {
            events = freshEvents;
            fillTypes();
            applyFilters();
            showStatus("Nieuwe evenementen zijn geladen.", "ok");
            setTimeout(hideStatus, 4000);
            return true;
          }
        } catch (error) {
          showStatus(`Nog aan het wachten op nieuwe data: ${error.message}`, "warn");
        }
      }

      await loadAll();
      showStatus("De update is gestart, maar GitHub Pages geeft nog dezelfde data terug. Wacht even en klik eventueel nogmaals op Ververs.", "warn");
      return false;
    }

    function fillTypes() {
      const current = $("typeFilter").value || "all";
      const activeEvents = events.filter(matchesDate);
      const types = [...new Set(activeEvents.map((event) => (event.type || "").trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "nl"));

      $("typeFilter").innerHTML = [
        '<option value="all">Alle types</option>',
        ...types.map((type) => `<option value="${escapeHtml(type.toLowerCase())}">${escapeHtml(type)}</option>`)
      ].join("");

      if ([...$("typeFilter").options].some((option) => option.value === current)) {
        $("typeFilter").value = current;
      } else {
        $("typeFilter").value = "all";
      }
    }

    function renderSites() {
      $("sitesList").innerHTML = sites.map((site) => `
        <label>
          <input class="siteCheck" type="checkbox" value="${escapeHtml(site)}" checked>
          <span>${escapeHtml(site)}</span>
        </label>
      `).join("");
      updateSiteCount();
    }

    function updateSiteCount() {
      $("siteCount").textContent = document.querySelectorAll(".siteCheck:checked").length;
    }

    function matchesDate(event) {
      if (event.isPermanent) return true;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(event.date || "")) return true;

      const day = new Date(event.date + "T00:00:00");
      const from = new Date(dateFrom + "T00:00:00");
      const to = new Date(dateTo + "T00:00:00");
      return day >= from && day <= to;
    }

    function applyFilters() {
      updateDateRange();
      fillTypes();

      const query = $("search").value.trim().toLowerCase();
      const type = $("typeFilter").value;
      const region = $("region").value.trim();

      $("pageTitle").textContent = `Evenementen rond ${region || "je regio"}`;
      $("pageSubtitle").textContent = `${prettyDate(dateFrom)} t/m ${prettyDate(dateTo)} - straal ${$("radius").value || 100} km`;
      document.title = `Evenementen rond ${region || "je regio"}`;

      filteredEvents = dedupeEvents(events).filter((event) => {
        const haystack = [
          event.title,
          event.description,
          event.location,
          event.type,
          event.source
        ].join(" ").toLowerCase();

        if (query && !haystack.includes(query)) return false;
        if (type !== "all" && (event.type || "").toLowerCase() !== type) return false;
        return matchesDate(event);
      }).sort((a, b) => {
        if (a.isPermanent && !b.isPermanent) return 1;
        if (!a.isPermanent && b.isPermanent) return -1;
        return String(a.date || "").localeCompare(String(b.date || ""));
      });

      currentPage = 1;
      render();
    }

    function render() {
      $("count").textContent = `${filteredEvents.length} ${filteredEvents.length === 1 ? "evenement" : "evenementen"}`;
      $("metaInfo").textContent = `Periode: ${dateFrom} t/m ${dateTo}`;

      if (!filteredEvents.length) {
        $("grid").innerHTML = '<div class="empty">Geen evenementen gevonden. Pas je filters aan of haal nieuwe resultaten op met Ververs.</div>';
        $("pagination").style.display = "none";
        return;
      }

      const pageCount = Math.max(1, Math.ceil(filteredEvents.length / eventsPerPage));
      currentPage = Math.min(currentPage, pageCount);
      const visible = filteredEvents.slice((currentPage - 1) * eventsPerPage, currentPage * eventsPerPage);

      $("grid").innerHTML = visible.map(renderCard).join("");
      $("pagination").style.display = pageCount > 1 ? "flex" : "none";
      $("pageInfo").textContent = `Pagina ${currentPage} van ${pageCount}`;
      $("prevPage").disabled = currentPage === 1;
      $("nextPage").disabled = currentPage === pageCount;
    }

    function renderCard(event) {
      const title = escapeHtml(event.title || "Naam onbekend");
      const type = cleanText(event.type || "Activiteit");
      const image = typeImage(type, event.image);
      const website = safeUrl(event.website, { website: true });
      const route = routeUrl(event);
      const routeInfo = route ? routeEstimate(event) : "";
      const dateLabel = event.periodLabel || prettyDate(event.date);
      const typeHeader = `
        <${website ? "a" : "div"} class="typeHeader ${website ? "typeHeaderLink" : ""}" style="background-image: url('${escapeHtml(image)}')"${website ? ` href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer"` : ""}>
          <span>${escapeHtml(type)}</span>
        </${website ? "a" : "div"}>
      `;
      const sourceTag = website
        ? `<a class="tag sourceLink" href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">${escapeHtml(event.source || "Bron onbekend")}</a>`
        : `<span class="tag">${escapeHtml(event.source || "Bron onbekend")}</span>`;

      return `
        <article class="card">
          ${typeHeader}
          <div class="cardBody">
            <div class="badges">
              ${sourceTag}
              <span class="tag tagAccent">${escapeHtml(dateLabel)}</span>
            </div>
            <h2 class="title">${title}</h2>
            <div class="details">
              <div class="detail"><span>Datum</span><span>${escapeHtml(prettyDate(event.date))}${event.time ? ` - ${escapeHtml(event.time)}` : ""}</span></div>
              <div class="detail"><span>Plaats</span><span>${escapeHtml(event.location || "Locatie onbekend")}</span></div>
              <div class="detail"><span>Type</span><span>${escapeHtml(type || "Type onbekend")}</span></div>
              <div class="detail"><span>Prijs</span><span>${escapeHtml(event.cost || "Zie website")}</span></div>
            </div>
            <p class="desc">${escapeHtml(event.description || "Geen omschrijving beschikbaar.")}</p>
            <div class="cardActions">
              ${website ? `<a class="btn btnPrimary" href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">Meer info</a>` : ""}
              ${route ? `<a class="btn btnSecondary" href="${escapeHtml(route)}" target="_blank" rel="noopener noreferrer">Route</a>` : ""}
              ${routeInfo ? `<span class="routeInfo">${escapeHtml(routeInfo)}</span>` : ""}
            </div>
          </div>
        </article>
      `;
    }

    function weatherTopicUrl(region, topic) {
      const query = `${region} ${topic}`.trim();
      return `https://www.weeronline.nl/zoekresultaten?keyword=${encodeURIComponent(query)}`;
    }

    async function loadWeather() {
      const region = $("region").value.trim();
      if (!region || !dateFrom || !dateTo) return;

      try {
        const url = `${WORKER_URL}/weather?region=${encodeURIComponent(region)}&from=${dateFrom}&to=${dateTo}`;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("Weer niet beschikbaar");
        const data = await response.json();
        if (!data || !data.ok) throw new Error("Weer niet beschikbaar");

        const weatherItems = [
          { label: `${data.summary} (${data.days} dagen)`, topic: "weersverwachting" },
          { label: `${data.tempMin} graden - ${data.tempMax} graden`, topic: "temperatuur" },
          { label: `Regen ${data.rainChance}%`, topic: "regenradar" },
          { label: `${data.rainTotalMM} mm`, topic: "neerslag" },
          { label: `Wind ${data.windMax} km/u`, topic: "wind" },
          { label: `UV ${data.uvMax}`, topic: "zonkracht" }
        ];

        $("weatherBox").innerHTML = `
          ${weatherItems.map((item) => `<button class="pill weatherToggle" type="button" data-topic="${escapeHtml(item.topic)}" data-label="${escapeHtml(item.label)}">${escapeHtml(item.label)}</button>`).join("")}
          <div class="weatherPanel" id="weatherPanel"></div>
        `;
      } catch {
        $("weatherBox").innerHTML = "";
      }
    }

    function isOpenAIQuotaError(message) {
      return /openai|chatgpt|quota|billing|insufficient_quota/i.test(String(message || ""));
    }

    async function refreshEvents() {
      const button = $("refreshBtn");
      const previousSignature = eventSignature(events);
      setBusy(button, true, "Bezig...");
      showStatus("Nieuwe evenementen ophalen...", "warn");

      const selectedSites = [...document.querySelectorAll(".siteCheck:checked")].map((check) => check.value);
      const category = $("typeFilter").value === "all" ? "" : $("typeFilter").value;
      const payload = {
        region: $("region").value.trim(),
        radius: $("radius").value,
        query: $("search").value.trim(),
        category,
        dateFrom,
        dateTo,
        minResults: 20,
        sites: selectedSites,
        providers: {
          perplexity: $("provPerplexity").checked,
          mistral: $("provMistral").checked,
          openai: $("provOpenAI").checked,
          chatgpt: $("provOpenAI").checked
        }
      };

      try {
        let response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        let data = await response.json().catch(() => ({}));

        if (!response.ok && isOpenAIQuotaError(data.error || data.message) && payload.providers.openai) {
          $("provOpenAI").checked = false;
          payload.providers.openai = false;
          payload.providers.chatgpt = false;
          showStatus("ChatGPT heeft geen API-quota meer. Ik probeer opnieuw zonder ChatGPT.", "warn");
          response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          data = await response.json().catch(() => ({}));
        }

        if (!response.ok) throw new Error(data.error || data.message || "Verversen is mislukt");

        showStatus(`Klaar. ${data.scrapedCount || 0} nieuwe resultaten gevonden. Ik wacht nu tot GitHub Pages de nieuwe lijst serveert.`, "ok");
        await waitForUpdatedEvents(previousSignature);
      } catch (error) {
        showStatus(`Starten mislukt: ${error.message}`, "error");
      } finally {
        setBusy(button, false);
      }
    }

    async function clearAllEvents() {
      if (!confirm("Weet je zeker dat je alle evenementen wilt verwijderen?")) return;

      const button = $("clearBtn");
      setBusy(button, true, "Verwijderen...");
      showStatus("Evenementen verwijderen...", "warn");

      try {
        const response = await fetch(`${WORKER_URL}/clear`, { method: "POST" });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Verwijderen is mislukt");

        showStatus("Alle evenementen zijn verwijderd. De lijst wordt zo opnieuw geladen.", "ok");
        setTimeout(loadAll, 7000);
      } catch (error) {
        showStatus(`Verwijderen mislukt: ${error.message}`, "error");
      } finally {
        setBusy(button, false);
      }
    }

    function resetFilters() {
      $("search").value = "";
      $("region").value = "Groningen";
      $("radius").value = "100";
      $("periodMode").value = "week";
      $("typeFilter").value = "all";
      $("provPerplexity").checked = false;
      $("provMistral").checked = false;
      $("provOpenAI").checked = false;
      document.querySelectorAll(".siteCheck").forEach((check) => { check.checked = true; });
      updateSiteCount();
      const today = formatDate(new Date());
      $("dateSingle").value = today;
      applyFilters();
      loadWeather();
      hideStatus();
    }

    async function loadAll() {
      updateDateRange();
      [events, sites] = await Promise.all([
        loadJson("./events.json", fallbackEvents),
        loadJson("./sites.json", [])
      ]);

      fillTypes();
      renderSites();
      applyFilters();
      loadWeather();
    }

    controls.forEach((id) => {
      $(id).addEventListener("input", () => {
        applyFilters();
      });
      $(id).addEventListener("change", () => {
        applyFilters();
      });
    });

    $("refreshBtn").addEventListener("click", refreshEvents);
    $("resetBtn").addEventListener("click", resetFilters);
    $("clearBtn").addEventListener("click", clearAllEvents);
    $("prevPage").addEventListener("click", () => { currentPage -= 1; render(); window.scrollTo({ top: 0, behavior: "smooth" }); });
    $("nextPage").addEventListener("click", () => { currentPage += 1; render(); window.scrollTo({ top: 0, behavior: "smooth" }); });
    $("allSitesBtn").addEventListener("click", () => { document.querySelectorAll(".siteCheck").forEach((check) => { check.checked = true; }); updateSiteCount(); });
    $("noSitesBtn").addEventListener("click", () => { document.querySelectorAll(".siteCheck").forEach((check) => { check.checked = false; }); updateSiteCount(); });
    $("sitesList").addEventListener("change", updateSiteCount);
    document.addEventListener("click", (event) => {
      const button = event.target.closest(".weatherToggle");
      if (!button) return;

      const panel = $("weatherPanel");
      if (!panel) return;

      const topic = cleanText(button.dataset.topic || button.textContent);
      const label = cleanText(button.dataset.label || button.textContent);
      const region = $("region").value.trim() || "Groningen";
      const alreadyOpen = panel.classList.contains("open") && panel.dataset.topic === topic;
      document.querySelectorAll(".weatherToggle").forEach((item) => item.setAttribute("aria-expanded", "false"));

      if (alreadyOpen) {
        panel.classList.remove("open");
        panel.dataset.topic = "";
        return;
      }

      const url = weatherTopicUrl(region, topic);
      button.setAttribute("aria-expanded", "true");
      panel.dataset.topic = topic;
      panel.innerHTML = `
        <span>${escapeHtml(label)} voor ${escapeHtml(region)}</span><br>
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">Bekijk ${escapeHtml(topic)} op Weeronline</a>
      `;
      panel.classList.add("open");
    });
    $("siteButton").addEventListener("click", () => {
      const select = $("siteSelect");
      const isOpen = select.classList.toggle("open");
      $("siteButton").setAttribute("aria-expanded", String(isOpen));
    });
    document.addEventListener("click", (event) => {
      if (!$("siteSelect").contains(event.target)) {
        $("siteSelect").classList.remove("open");
        $("siteButton").setAttribute("aria-expanded", "false");
      }
    });

    const today = formatDate(new Date());
    $("dateSingle").value = today;
    $("versionBadge").textContent = `Versie ${APP_VERSION}`;
    loadAll();
  </script>
</body>
</html>
