<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evenementen</title>

  <style>
    :root{
      --bg:#f3f8ff;
      --surface:#ffffff;
      --surface-2:#eef5ff;
      --primary:#1d4ed8;
      --primary-dark:#163ea7;
      --text:#10233e;
      --muted:#61738c;
      --border:#d8e5ff;
      --shadow:0 10px 30px rgba(29,78,216,.12);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:linear-gradient(180deg,#eff5ff 0%,#f8fbff 100%);
      color:var(--text);
    }

    .header{
      padding:52px 20px 34px;
      color:#fff;
      position:relative;
      overflow:hidden;
    }

    .header::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,#0f2d6b 0%,#2563eb 100%);
      z-index:-2;
    }

    .header::after{
      content:"";
      position:absolute;
      inset:0;
      opacity:0.35;
      background-size:cover;
      background-position:center;
      z-index:-1;
      transition:opacity .4s ease;
    }

    .header.sunny::after{
      background-image:url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1600&q=80");
      opacity:0.45;
    }

    .header.cloudy::after{
      background-image:url("https://images.unsplash.com/photo-1526679492918-6e1d6b7f3f9b?auto=format&fit=crop&w=1600&q=80");
      opacity:0.45;
    }

    .header.rainy::after{
      background-image:url("https://images.unsplash.com/photo-1501696461441-2f7f9c3d5f46?auto=format&fit=crop&w=1600&q=80");
      opacity:0.55;
    }

    .header.snowy::after{
      background-image:url("https://images.unsplash.com/photo-1547756536-cde3673fa2a5?auto=format&fit=crop&w=1600&q=80");
      opacity:0.55;
    }

    .wrap{max-width:1180px;margin:0 auto}

    .header h1{margin:0;font-size:clamp(2.2rem,4vw,3.6rem)}
    .header p{margin:12px 0 0;color:#dce8ff;max-width:760px}

    .weatherBox{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      font-weight:900;
      color:#ffffff;
    }

    .weatherBadge{
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.35);
      padding:8px 12px;
      border-radius:999px;
      font-size:14px;
      backdrop-filter: blur(10px);
    }

    .container{max-width:1180px;margin:-18px auto 0;padding:0 16px 40px}

    .toolbar{
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      padding:18px;
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .filters{
      display:grid;
      grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr auto;
      gap:14px;
      align-items:end;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:900;
      color:var(--primary-dark);
      font-size:14px;
    }

    .field input,.field select{
      width:100%;
      padding:13px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      font-size:15px;
      color:var(--text);
    }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin:18px 2px;
    }

    .meta strong{color:var(--primary-dark)}
    .meta span{color:var(--muted);font-size:14px}

    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;
    }

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .18s ease,box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 34px rgba(29,78,216,.18);
    }

    .image{
      height:160px;
      background-size:cover;
      background-position:center;
      background-color:#e9f0ff;
    }

    .content{padding:16px}

    .source{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:var(--surface-2);
      color:var(--primary-dark);
      font-size:12px;
      font-weight:900;
      margin-bottom:10px;
    }

    .title{
      margin:0 0 8px;
      font-size:1.05rem;
      color:#0d2350;
    }

    .meta-list{
      display:grid;
      gap:6px;
      font-size:13px;
      color:#29415f;
    }

    .desc{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      min-height:56px;
      margin:12px 0;
    }

    .links{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:900;
      font-size:14px;
      border:none;
      cursor:pointer;
    }

    .btn-primary{background:var(--primary);color:#fff}
    .btn-secondary{background:var(--surface-2);color:var(--primary-dark)}

    .notice{
      margin-top:12px;
      padding:12px 14px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:14px;
      color:var(--muted);
      font-size:14px;
      display:none;
    }

    .rowCompact{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:12px;
      padding-top:12px;
    }

    .providers{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      font-size:14px;
      color:var(--primary-dark);
      font-weight:900;
    }

    .providers label{
      display:flex;
      gap:6px;
      align-items:center;
      background:var(--surface-2);
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      cursor:pointer;
      user-select:none;
    }

    .dropdown {
      position: relative;
      min-width: 320px;
      flex: 1;
    }

    .dropdown-btn {
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-weight: 900;
      color: var(--primary-dark);
      font-size: 14px;
    }

    .dropdown-panel {
      display: none;
      position: absolute;
      z-index: 999;
      top: 48px;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .dropdown-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .dropdown-panel label:hover {
      background: var(--surface-2);
    }

    .dropdown-actions {
      display:flex;
      gap:8px;
      padding-top:10px;
      flex-wrap:wrap;
    }

    .smallbtn{
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--surface-2);
      cursor:pointer;
      font-weight:900;
      color:var(--primary-dark);
      font-size:13px;
    }

    @media (max-width:1200px){
      .filters{grid-template-columns:1fr 1fr 1fr}
      .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width:900px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width:760px){
      .filters{grid-template-columns:1fr}
      .header{padding-top:38px}
      .image{height:170px}
      .toolbar{border-radius:18px}
      .grid{grid-template-columns:1fr}
      .dropdown{min-width:100%}
    }
  </style>
</head>

<body>
<header class="header" id="pageHeader">
  <div class="wrap">
    <h1 id="pageTitle">Evenementen rond Groningen</h1>
    <p id="pageSubtitle">Bekijk evenementen, tips en activiteiten in en rond Groningen.</p>

    <div class="weatherBox" id="weatherBox" style="display:none;">
      <div class="weatherBadge" id="weatherText">🌤️ Weer: ...</div>
      <div class="weatherBadge" id="weatherTemp">🌡️ ...</div>
      <div class="weatherBadge" id="weatherRain">🌧️ ...</div>
    </div>
  </div>
</header>

<main class="container">
  <section class="toolbar">

    <div class="filters">
      <div class="field">
        <label for="search">Zoeken</label>
        <input id="search" placeholder="Omschrijving (optioneel)" oninput="applyFilters()">
      </div>

      <div class="field">
        <label for="region">Regio</label>
        <input id="region" value="Groningen" oninput="applyFilters()">
      </div>

      <div class="field">
        <label for="radius">Straal (km)</label>
        <input id="radius" type="number" min="1" max="300" value="100">
      </div>

      <div class="field">
        <label for="typeFilter">Evenementen</label>
        <select id="typeFilter" onchange="applyFilters()">
          <option value="all">Alle types</option>
        </select>
      </div>

      <div class="field">
        <label for="dateFrom">Van</label>
        <input id="dateFrom" type="date" onchange="applyFilters(); loadWeather();">
      </div>

      <div class="field">
        <label for="dateTo">Tot</label>
        <input id="dateTo" type="date" onchange="applyFilters(); loadWeather();">
      </div>

      <div class="field">
        <label for="minResults">Min. aantal</label>
        <input id="minResults" type="number" min="1" max="100" value="20">
      </div>

      <button class="btn btn-primary" id="refreshBtn" onclick="triggerRemoteRefresh()">Ververs</button>
    </div>

    <div class="rowCompact">
      <div class="providers">
        <label><input type="checkbox" id="provPerplexity" checked> Perplexity</label>
        <label><input type="checkbox" id="provMistral" checked> Mistral</label>
        <label><input type="checkbox" id="provOpenAI"> OpenAI</label>
      </div>

      <div class="dropdown" id="sitesDropdown">
        <button class="dropdown-btn" onclick="toggleDropdown(event)">
          Websites (<span id="siteCount">0</span>)
        </button>

        <div class="dropdown-panel" id="dropdownPanel">
          <div id="sitesList"></div>

          <div class="dropdown-actions">
            <button class="smallbtn" onclick="selectAllSites()">Alles</button>
            <button class="smallbtn" onclick="selectNoneSites()">Geen</button>
          </div>
        </div>
      </div>
    </div>

    <div class="notice" id="status"></div>
  </section>

  <div class="meta">
    <strong id="count">0 evenementen</strong>
    <span id="metaInfo">Resultaten worden geladen uit <code>events.json</code>.</span>
  </div>

  <section class="grid" id="grid"></section>
</main>

<script>
  let events = [];
  let availableSites = [];

  const WORKER_URL = "https://evenementen-refresh.mrsjonnie.workers.dev";

  function formatCityName(value){
    const text = (value || "").trim();
    if(!text) return "Groningen";
    return text.charAt(0).toUpperCase() + text.slice(1);
  }

  function updatePageTitle(){
    const city = formatCityName(document.getElementById("region").value);
    document.getElementById("pageTitle").textContent = `Evenementen rond ${city}`;
    document.getElementById("pageSubtitle").textContent = `Bekijk evenementen, tips en activiteiten in en rond ${city}.`;
    document.title = `Evenementen rond ${city}`;
  }

  function fillFilters(items){
    const typeSelect = document.getElementById("typeFilter");
    const current = typeSelect.value || "all";

    const types = [...new Set(items.map(e => (e.type || "").trim()).filter(Boolean))].sort();

    typeSelect.innerHTML =
      '<option value="all">Alle types</option>' +
      types.map(v => `<option value="${v.toLowerCase()}">${v}</option>`).join("");

    if([...typeSelect.options].some(o => o.value === current)){
      typeSelect.value = current;
    }
  }

  async function loadData(){
    const res = await fetch("./events.json?_=" + Date.now(), { cache: "no-store" });
    if(!res.ok) throw new Error("events.json kon niet worden geladen");

    events = await res.json();
    if(!Array.isArray(events)) events = [];

    fillFilters(events);
    applyFilters();
  }

  function render(items){
    document.getElementById("count").textContent = `${items.length} evenementen`;

    document.getElementById("grid").innerHTML = items.map(e => {
      return `
        <article class="card">
          <div class="image" style="background-image:url('${e.image || ""}')"></div>
          <div class="content">
            <div class="source">${e.source || "Bron onbekend"}</div>
            <h2 class="title">${e.title || ""}</h2>

            <div class="meta-list">
              <div>📅 ${e.date || "Onbekend"} ${e.time || ""}</div>
              <div>📍 ${e.location || "Onbekend"}</div>
              <div>🏷️ ${e.type || "Onbekend"}</div>
              <div>💶 ${e.cost || "Zie website"}</div>
            </div>

            <p class="desc">${e.description || ""}</p>

            <div class="links">
              <a class="btn btn-primary" href="${e.website || "#"}" target="_blank" rel="noopener noreferrer">
                Meer info
              </a>
              ${e.locationLink ? `
                <a class="btn btn-secondary" href="${e.locationLink}" target="_blank" rel="noopener noreferrer">
                  Route
                </a>
              ` : ""}
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function isWithinDateRange(eventDate, from, to){
    if(!eventDate) return true;
    if(!eventDate.match(/^\d{4}-\d{2}-\d{2}$/)) return true;

    const d = new Date(eventDate);
    const f = new Date(from);
    const t = new Date(to);

    d.setHours(0,0,0,0);
    f.setHours(0,0,0,0);
    t.setHours(0,0,0,0);

    return d >= f && d <= t;
  }

  function applyFilters(){
    updatePageTitle();

    const q = document.getElementById("search").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;

    const dateFrom = document.getElementById("dateFrom").value;
    const dateTo = document.getElementById("dateTo").value;

    const filtered = events.filter(e => {
      const hay = `${e.title || ""} ${e.description || ""} ${e.location || ""}`.toLowerCase();

      if(q && !hay.includes(q)) return false;
      if(type !== "all" && (e.type || "").toLowerCase() !== type) return false;

      if(dateFrom && dateTo && !isWithinDateRange(e.date, dateFrom, dateTo)) return false;

      return true;
    });

    document.getElementById("metaInfo").textContent =
      `Periode: ${dateFrom} t/m ${dateTo}`;

    render(filtered);
  }

  function getWeekendRange(){
    const today = new Date();
    const day = today.getDay();

    const friday = new Date(today);
    const diffToFriday = (5 - day + 7) % 7;
    friday.setDate(today.getDate() + diffToFriday);

    const sunday = new Date(friday);
    sunday.setDate(friday.getDate() + 2);

    const fmt = (d) => d.toISOString().slice(0, 10);

    return { from: fmt(friday), to: fmt(sunday) };
  }

  async function loadSites(){
    const res = await fetch("./sites.json?_=" + Date.now(), { cache: "no-store" });
    if(!res.ok) throw new Error("sites.json kon niet worden geladen");

    availableSites = await res.json();
    if(!Array.isArray(availableSites)) availableSites = [];

    renderSitesDropdown();
  }

  function renderSitesDropdown(){
    const container = document.getElementById("sitesList");

    container.innerHTML = availableSites.map(site => {
      return `
        <label>
          <input class="siteCheck" type="checkbox" value="${site}" checked onchange="updateSiteCount()">
          ${site}
        </label>
      `;
    }).join("");

    updateSiteCount();
  }

  function updateSiteCount(){
    const selected = document.querySelectorAll(".siteCheck:checked").length;
    document.getElementById("siteCount").textContent = selected;
  }

  function toggleDropdown(e){
    e.preventDefault();
    const panel = document.getElementById("dropdownPanel");
    panel.style.display = (panel.style.display === "block") ? "none" : "block";
  }

  function selectAllSites(){
    document.querySelectorAll(".siteCheck").forEach(cb => cb.checked = true);
    updateSiteCount();
  }

  function selectNoneSites(){
    document.querySelectorAll(".siteCheck").forEach(cb => cb.checked = false);
    updateSiteCount();
  }

  document.addEventListener("click", (e) => {
    const dropdown = document.getElementById("sitesDropdown");
    const panel = document.getElementById("dropdownPanel");

    if(!dropdown.contains(e.target)){
      panel.style.display = "none";
    }
  });

  // ---- WEER ----
  function weatherClassFromCode(code){
    // Open-Meteo weathercode mapping (simpel)
    if(code === 0) return "sunny";
    if([1,2,3,45,48].includes(code)) return "cloudy";
    if([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code)) return "rainy";
    if([71,73,75,77,85,86].includes(code)) return "snowy";
    return "cloudy";
  }

  function weatherTextFromCode(code){
    if(code === 0) return "Zonnig";
    if(code === 1) return "Meestal zonnig";
    if(code === 2) return "Half bewolkt";
    if(code === 3) return "Bewolkt";
    if([45,48].includes(code)) return "Mist";
    if([51,53,55].includes(code)) return "Motregen";
    if([61,63,65].includes(code)) return "Regen";
    if([71,73,75].includes(code)) return "Sneeuw";
    if([80,81,82].includes(code)) return "Buien";
    if([95,96,99].includes(code)) return "Onweer";
    return "Onbekend";
  }

  async function loadWeather(){
    const region = document.getElementById("region").value.trim();
    const dateFrom = document.getElementById("dateFrom").value;
    const dateTo = document.getElementById("dateTo").value;

    if(!region || !dateFrom || !dateTo) return;

    try{
      const url = `${WORKER_URL}/weather?region=${encodeURIComponent(region)}&from=${dateFrom}&to=${dateTo}`;
      const res = await fetch(url, { cache:"no-store" });

      if(!res.ok) return;

      const data = await res.json();
      if(!data || !data.ok) return;

      const weatherBox = document.getElementById("weatherBox");
      weatherBox.style.display = "flex";

      document.getElementById("weatherText").textContent =
        `🌤️ ${data.summary}`;

      document.getElementById("weatherTemp").textContent =
        `🌡️ ${data.tempMin}°C - ${data.tempMax}°C`;

      document.getElementById("weatherRain").textContent =
        `🌧️ Regen kans: ${data.rainChance}%`;

      const header = document.getElementById("pageHeader");
      header.classList.remove("sunny","cloudy","rainy","snowy");
      header.classList.add(weatherClassFromCode(data.weatherCode));

    } catch(e){
      // stil falen
    }
  }

  // ---- REFRESH ----
  async function triggerRemoteRefresh(){
    const btn = document.getElementById("refreshBtn");
    const status = document.getElementById("status");

    status.style.display = "block";
    btn.disabled = true;
    btn.textContent = "Bezig...";
    status.textContent = "Nieuwe events ophalen...";

    const sites = [];
    document.querySelectorAll(".siteCheck:checked").forEach(cb => sites.push(cb.value));

    let category = document.getElementById("typeFilter").value;
    if(category === "all") category = "";

    const payload = {
      region: document.getElementById("region").value.trim(),
      radius: document.getElementById("radius").value,
      query: document.getElementById("search").value.trim(),
      category: category,
      dateFrom: document.getElementById("dateFrom").value,
      dateTo: document.getElementById("dateTo").value,
      minResults: Number(document.getElementById("minResults").value || 20),
      sites: sites,
      providers: {
        perplexity: document.getElementById("provPerplexity").checked,
        mistral: document.getElementById("provMistral").checked,
        openai: document.getElementById("provOpenAI").checked
      }
    };

    try{
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "Onbekende fout");

      status.textContent = `Update gestart (${data.scrapedCount} nieuwe gevonden). events.json wordt bijgewerkt...`;

      setTimeout(async () => {
        status.textContent = "Nieuwe events.json laden...";
        await loadData();
        status.textContent = "Klaar! Nieuwe events zijn geladen.";
      }, 9000);

    } catch(e){
      status.textContent = "Starten mislukt: " + e.message;
    }

    btn.disabled = false;
    btn.textContent = "Ververs";
  }

  // defaults: dit weekend
  const weekend = getWeekendRange();
  document.getElementById("dateFrom").value = weekend.from;
  document.getElementById("dateTo").value = weekend.to;

  Promise.all([loadSites(), loadData()]).then(() => {
    loadWeather();
  }).catch((e) => {
    const status = document.getElementById("status");
    status.style.display = "block";
    status.textContent = "Laden mislukt: " + e.message;
  });
</script>

</body>
</html>
