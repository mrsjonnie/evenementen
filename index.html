<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evenementen rond Groningen</title>

<style>
:root{
  --bg:#f3f8ff;
  --surface:#ffffff;
  --surface-2:#eef5ff;
  --primary:#1d4ed8;
  --primary-dark:#163ea7;
  --text:#10233e;
  --muted:#61738c;
  --border:#d8e5ff;
  --shadow:0 10px 30px rgba(29,78,216,.12);
  --radius:20px
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:linear-gradient(180deg,#eff5ff 0%,#f8fbff 100%);
  color:var(--text)
}
.header{
  padding:52px 20px 34px;
  background:linear-gradient(135deg,#0f2d6b 0%,#2563eb 100%);
  color:#fff
}
.wrap{max-width:1180px;margin:0 auto}
.header h1{margin:0;font-size:clamp(2.2rem,4vw,3.6rem)}
.header p{margin:12px 0 0;color:#dce8ff;max-width:760px}
.container{max-width:1180px;margin:-18px auto 0;padding:0 16px 40px}
.toolbar{
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(10px);
  padding:18px;
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:var(--shadow)
}
.filters{
  display:grid;
  grid-template-columns:2fr 1.2fr 1fr 1fr 1fr 1fr auto;
  gap:14px;
  align-items:end
}
.field label{
  display:block;
  margin-bottom:6px;
  font-weight:700;
  color:var(--primary-dark);
  font-size:14px
}
.field input,.field select{
  width:100%;
  padding:13px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#fff;
  font-size:15px;
  color:var(--text)
}
.meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin:18px 2px
}
.meta strong{color:var(--primary-dark)}
.meta span{color:var(--muted);font-size:14px}
.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:16px
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  transition:transform .18s ease,box-shadow .18s ease
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 34px rgba(29,78,216,.18)
}
.image{height:160px;background-size:cover;background-position:center;background-color:#e9f0ff}
.content{padding:16px}
.source{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:var(--surface-2);
  color:var(--primary-dark);
  font-size:12px;
  font-weight:700;
  margin-bottom:10px
}
.title{margin:0 0 8px;font-size:1.05rem;color:#0d2350}
.meta-list{display:grid;gap:6px;font-size:13px;color:#29415f}
.desc{color:var(--muted);font-size:13px;line-height:1.45;min-height:56px;margin:12px 0}
.links{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:12px 14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
  border:none;
  cursor:pointer
}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--surface-2);color:var(--primary-dark)}
.notice{
  margin-top:12px;
  padding:12px 14px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--muted);
  font-size:14px;
  display:none
}
@media (max-width:1200px){
  .filters{grid-template-columns:1fr 1fr 1fr}
  .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media (max-width:900px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:760px){
  .filters{grid-template-columns:1fr}
  .header{padding-top:38px}
  .image{height:170px}
  .toolbar{border-radius:18px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<header class="header">
  <div class="wrap">
    <h1 id="pageTitle">Evenementen rond Groningen</h1>
    <p id="pageSubtitle">Bekijk evenementen, tips en activiteiten in en rond Groningen.</p>
  </div>
</header>

<main class="container">
  <section class="toolbar">
    <div class="filters">
      <div class="field">
        <label for="search">Zoeken</label>
        <input id="search" placeholder="Zoek op titel, beschrijving of plaats" oninput="applyFilters()">
      </div>

      <div class="field">
        <label for="region">Regio / startplaats</label>
        <input id="region" value="Groningen" placeholder="Bijv. Groningen, Assen, Drachten" oninput="applyFilters()">
      </div>

      <div class="field">
        <label for="radius">Straal in km</label>
        <input id="radius" type="number" min="1" max="300" value="140" oninput="applyFilters()">
      </div>

      <div class="field">
