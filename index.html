<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evenementen rond Groningen</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #eef4fb;
      --ink: #142033;
      --muted: #617084;
      --line: #dce5ef;
      --primary: #176b87;
      --primary-dark: #0f4d64;
      --accent: #d55f3f;
      --good: #177a52;
      --warn: #a55c12;
      --danger: #b42318;
      --shadow: 0 14px 34px rgba(20, 32, 51, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(23, 107, 135, .28);
      outline-offset: 2px;
    }

    .hero {
      color: #fff;
      background:
        linear-gradient(90deg, rgba(12, 48, 64, .92), rgba(12, 48, 64, .58)),
        url("https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .heroInner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 760px;
      color: rgba(255, 255, 255, .84);
      font-weight: 700;
      line-height: 1.45;
    }

    .weather {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 560px;
    }

    .pill {
      border: 1px solid rgba(255, 255, 255, .34);
      background: rgba(255, 255, 255, .16);
      color: #fff;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .82rem;
      font-weight: 800;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 16px 44px;
    }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.7fr 1fr .8fr 1fr 1fr 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      color: var(--primary-dark);
      font-weight: 900;
      font-size: .82rem;
    }

    input,
    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 11px;
      font-weight: 700;
    }

    .btn {
      min-height: 42px;
      border: 0;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 13px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .btnPrimary { background: var(--primary); color: #fff; }
    .btnPrimary:hover { background: var(--primary-dark); }
    .btnSecondary { background: var(--surface-soft); color: var(--primary-dark); }
    .btnDanger { background: #fff1ee; color: var(--danger); border: 1px solid #f5c6bd; }
    .btn[disabled] { opacity: .58; cursor: not-allowed; }

    .secondRow {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding-top: 12px;
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--primary-dark);
      font-size: .84rem;
      font-weight: 900;
      user-select: none;
    }

    .check input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .siteSelect {
      position: relative;
      min-width: 260px;
      flex: 1;
      max-width: 460px;
    }

    .siteButton {
      width: 100%;
      justify-content: space-between;
    }

    .sitePanel {
      position: absolute;
      z-index: 10;
      top: 48px;
      left: 0;
      right: 0;
      max-height: 280px;
      overflow: auto;
      display: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
    }

    .siteSelect.open .sitePanel { display: block; }

    .siteList {
      display: grid;
      gap: 3px;
    }

    .siteList label {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: var(--radius);
      color: var(--ink);
      font-size: .88rem;
      font-weight: 800;
    }

    .siteList label:hover { background: var(--surface-soft); }

    .siteActions {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      margin-top: 8px;
    }

    .status {
      display: none;
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-weight: 800;
      line-height: 1.4;
    }

    .status.show { display: block; }
    .status.ok { color: var(--good); border-color: #b8ddcc; background: #edf8f3; }
    .status.warn { color: var(--warn); border-color: #efd5aa; background: #fff8eb; }
    .status.error { color: var(--danger); border-color: #efb9b1; background: #fff1ee; }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin: 18px 2px 12px;
    }

    .summary strong {
      color: var(--primary-dark);
      font-size: 1.05rem;
    }

    .summary span {
      color: var(--muted);
      font-weight: 750;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(20, 32, 51, .08);
      display: flex;
      flex-direction: column;
    }

    .image {
      height: 150px;
      background: var(--surface-soft) center/cover;
      position: relative;
    }

    .image::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 42px;
      background: linear-gradient(transparent, rgba(0, 0, 0, .22));
    }

    .cardBody {
      padding: 13px;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--surface-soft);
      color: var(--primary-dark);
      font-weight: 900;
      font-size: .76rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tagAccent {
      background: #fff0ea;
      color: var(--accent);
    }

    .title {
      margin: 0;
      color: #102033;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .details {
      display: grid;
      gap: 6px;
      color: #33445b;
      font-size: .9rem;
      font-weight: 780;
    }

    .detail {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 6px;
      align-items: start;
    }

    .detail span:last-child {
      overflow-wrap: anywhere;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: .9rem;
      font-weight: 650;
    }

    .cardActions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 28px;
      background: var(--surface);
      border: 1px dashed #b8c7d9;
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.5;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .pageText {
      min-width: 118px;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
    }

    @media (max-width: 1120px) {
      .filters { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .heroInner { grid-template-columns: 1fr; }
      .weather { justify-content: flex-start; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 680px) {
      .heroInner { padding-top: 20px; }
      h1 { font-size: 1.55rem; }
      .filters { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .siteSelect { min-width: 100%; max-width: none; }
      .btn { width: 100%; }
      .checks { width: 100%; }
      .check { flex: 1; justify-content: center; }
      .pagination .btn { width: auto; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="heroInner">
      <div>
        <h1 id="pageTitle">Evenementen rond Groningen</h1>
        <p class="subtitle" id="pageSubtitle">Vind snel wat er te doen is, filter op datum en type, en ververs de lijst wanneer je nieuwe resultaten wilt ophalen.</p>
      </div>
      <div class="weather" id="weatherBox" aria-live="polite"></div>
    </div>
  </header>

  <main>
    <section class="toolbar" aria-label="Filters">
      <div class="filters">
        <div class="field">
          <label for="search">Zoeken</label>
          <input id="search" type="search" placeholder="Naam, plaats of omschrijving">
        </div>

        <div class="field">
          <label for="region">Regio</label>
          <input id="region" value="Groningen">
        </div>

        <div class="field">
          <label for="radius">Straal</label>
          <input id="radius" type="number" min="1" max="300" value="100" inputmode="numeric">
        </div>

        <div class="field">
          <label for="typeFilter">Type</label>
          <select id="typeFilter">
            <option value="all">Alle types</option>
          </select>
        </div>

        <div class="field">
          <label for="dateSingle">Startdatum</label>
          <input id="dateSingle" type="date">
        </div>

        <div class="field">
          <label for="periodMode">Periode</label>
          <select id="periodMode">
            <option value="day">Alleen deze dag</option>
            <option value="thisWeekend">Dit weekend</option>
            <option value="nextWeekend">Volgend weekend</option>
            <option value="week" selected>7 dagen</option>
          </select>
        </div>

        <button class="btn btnPrimary" id="refreshBtn" type="button">Ververs</button>
        <button class="btn btnSecondary" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="secondRow">
        <div class="checks" aria-label="Aanbieders">
          <label class="check"><input type="checkbox" id="provPerplexity" checked> Perplexity</label>
          <label class="check"><input type="checkbox" id="provMistral" checked> Mistral</label>
          <label class="check"><input type="checkbox" id="provOpenAI"> OpenAI</label>
        </div>

        <div class="siteSelect" id="siteSelect">
          <button class="btn btnSecondary siteButton" id="siteButton" type="button" aria-expanded="false">
            <span>Websites (<span id="siteCount">0</span>)</span>
            <span aria-hidden="true">v</span>
          </button>
          <div class="sitePanel">
            <div class="siteList" id="sitesList"></div>
            <div class="siteActions">
              <button class="btn btnSecondary" id="allSitesBtn" type="button">Alles</button>
              <button class="btn btnSecondary" id="noSitesBtn" type="button">Geen</button>
            </div>
          </div>
        </div>

        <button class="btn btnDanger" id="clearBtn" type="button">Alles verwijderen</button>
      </div>

      <div class="status" id="status" aria-live="polite"></div>
    </section>

    <div class="summary">
      <strong id="count">Evenementen laden...</strong>
      <span id="metaInfo">Een moment geduld</span>
    </div>

    <section class="grid" id="grid" aria-live="polite"></section>

    <nav class="pagination" id="pagination" aria-label="Paginering">
      <button class="btn btnSecondary" id="prevPage" type="button">Vorige</button>
      <span class="pageText" id="pageInfo">Pagina 1 van 1</span>
      <button class="btn btnSecondary" id="nextPage" type="button">Volgende</button>
    </nav>
  </main>

  <script>
    const WORKER_URL = "https://evenementen-refresh.mrsjonnie.workers.dev";
    const eventsPerPage = 9;
    const fallbackEvents = [
      {
        title: "Groninger Museum",
        type: "museum",
        date: "Hele jaar",
        location: "Groningen",
        cost: "Zie website",
        description: "Moderne kunst en wisselende tentoonstellingen.",
        image: "https://picsum.photos/seed/Groninger+Museum/800/500",
        website: "https://www.groningermuseum.nl",
        source: "Manual",
        periodLabel: "Hele jaar",
        isPermanent: true
      },
      {
        title: "Fort Bourtange",
        type: "historie",
        date: "Hele jaar",
        location: "Bourtange",
        cost: "Zie website",
        description: "Historische vesting met demonstraties en musea.",
        image: "https://picsum.photos/seed/Fort+Bourtange/800/500",
        website: "https://www.bourtange.nl",
        source: "Manual",
        periodLabel: "Hele jaar",
        isPermanent: true
      }
    ];

    let events = [];
    let sites = [];
    let filteredEvents = [];
    let currentPage = 1;
    let dateFrom = "";
    let dateTo = "";

    const $ = (id) => document.getElementById(id);
    const controls = ["search", "region", "radius", "typeFilter", "dateSingle", "periodMode"];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function safeUrl(value) {
      try {
        const url = new URL(value || "", window.location.href);
        return ["http:", "https:", "mailto:"].includes(url.protocol) ? url.href : "";
      } catch {
        return "";
      }
    }

    function formatDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function prettyDate(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value || "")) return value || "Datum onbekend";
      return new Intl.DateTimeFormat("nl-NL", {
        weekday: "short",
        day: "numeric",
        month: "short"
      }).format(new Date(value + "T00:00:00"));
    }

    function getWeekendRange(offsetWeeks = 0) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      today.setDate(today.getDate() + offsetWeeks * 7);
      const diffToFriday = (5 - today.getDay() + 7) % 7;
      const friday = new Date(today);
      friday.setDate(today.getDate() + diffToFriday);
      const sunday = new Date(friday);
      sunday.setDate(friday.getDate() + 2);
      return { from: formatDate(friday), to: formatDate(sunday) };
    }

    function updateDateRange() {
      const mode = $("periodMode").value;
      const baseDate = $("dateSingle").value;

      if (mode === "thisWeekend" || mode === "nextWeekend") {
        const range = getWeekendRange(mode === "nextWeekend" ? 1 : 0);
        dateFrom = range.from;
        dateTo = range.to;
        $("dateSingle").value = range.from;
        return;
      }

      const start = baseDate || formatDate(new Date());
      const startDate = new Date(start + "T00:00:00");
      dateFrom = start;
      dateTo = start;

      if (mode === "week") {
        const end = new Date(startDate);
        end.setDate(startDate.getDate() + 6);
        dateTo = formatDate(end);
      }
    }

    function showStatus(message, type = "") {
      const status = $("status");
      status.className = `status show ${type}`.trim();
      status.textContent = message;
    }

    function hideStatus() {
      $("status").className = "status";
      $("status").textContent = "";
    }

    function setBusy(button, busy, text) {
      button.disabled = busy;
      button.dataset.originalText ||= button.textContent;
      button.textContent = busy ? text : button.dataset.originalText;
    }

    async function loadJson(path, fallback) {
      try {
        const response = await fetch(`${path}?_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} kon niet worden geladen`);
        const data = await response.json();
        return Array.isArray(data) ? data : fallback;
      } catch {
        return fallback;
      }
    }

    function fillTypes() {
      const current = $("typeFilter").value || "all";
      const types = [...new Set(events.map((event) => (event.type || "").trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "nl"));

      $("typeFilter").innerHTML = [
        '<option value="all">Alle types</option>',
        ...types.map((type) => `<option value="${escapeHtml(type.toLowerCase())}">${escapeHtml(type)}</option>`)
      ].join("");

      if ([...$("typeFilter").options].some((option) => option.value === current)) {
        $("typeFilter").value = current;
      }
    }

    function renderSites() {
      $("sitesList").innerHTML = sites.map((site) => `
        <label>
          <input class="siteCheck" type="checkbox" value="${escapeHtml(site)}" checked>
          <span>${escapeHtml(site)}</span>
        </label>
      `).join("");
      updateSiteCount();
    }

    function updateSiteCount() {
      $("siteCount").textContent = document.querySelectorAll(".siteCheck:checked").length;
    }

    function matchesDate(event) {
      if (event.isPermanent) return true;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(event.date || "")) return true;

      const day = new Date(event.date + "T00:00:00");
      const from = new Date(dateFrom + "T00:00:00");
      const to = new Date(dateTo + "T00:00:00");
      return day >= from && day <= to;
    }

    function applyFilters() {
      updateDateRange();

      const query = $("search").value.trim().toLowerCase();
      const type = $("typeFilter").value;
      const region = $("region").value.trim();

      $("pageTitle").textContent = `Evenementen rond ${region || "je regio"}`;
      $("pageSubtitle").textContent = `${prettyDate(dateFrom)} t/m ${prettyDate(dateTo)} - straal ${$("radius").value || 100} km`;
      document.title = `Evenementen rond ${region || "je regio"}`;

      filteredEvents = events.filter((event) => {
        const haystack = [
          event.title,
          event.description,
          event.location,
          event.type,
          event.source
        ].join(" ").toLowerCase();

        if (query && !haystack.includes(query)) return false;
        if (type !== "all" && (event.type || "").toLowerCase() !== type) return false;
        return matchesDate(event);
      }).sort((a, b) => {
        if (a.isPermanent && !b.isPermanent) return 1;
        if (!a.isPermanent && b.isPermanent) return -1;
        return String(a.date || "").localeCompare(String(b.date || ""));
      });

      currentPage = 1;
      render();
    }

    function render() {
      $("count").textContent = `${filteredEvents.length} ${filteredEvents.length === 1 ? "evenement" : "evenementen"}`;
      $("metaInfo").textContent = `Periode: ${dateFrom} t/m ${dateTo}`;

      if (!filteredEvents.length) {
        $("grid").innerHTML = '<div class="empty">Geen evenementen gevonden. Pas je filters aan of haal nieuwe resultaten op met Ververs.</div>';
        $("pagination").style.display = "none";
        return;
      }

      const pageCount = Math.max(1, Math.ceil(filteredEvents.length / eventsPerPage));
      currentPage = Math.min(currentPage, pageCount);
      const visible = filteredEvents.slice((currentPage - 1) * eventsPerPage, currentPage * eventsPerPage);

      $("grid").innerHTML = visible.map(renderCard).join("");
      $("pagination").style.display = pageCount > 1 ? "flex" : "none";
      $("pageInfo").textContent = `Pagina ${currentPage} van ${pageCount}`;
      $("prevPage").disabled = currentPage === 1;
      $("nextPage").disabled = currentPage === pageCount;
    }

    function renderCard(event) {
      const title = escapeHtml(event.title || "Naam onbekend");
      const image = safeUrl(event.image) || "https://picsum.photos/seed/evenement/800/500";
      const website = safeUrl(event.website);
      const route = safeUrl(event.locationLink);
      const dateLabel = event.periodLabel || prettyDate(event.date);

      return `
        <article class="card">
          <div class="image" style="background-image: url('${escapeHtml(image)}')"></div>
          <div class="cardBody">
            <div class="badges">
              <span class="tag">${escapeHtml(event.source || "Bron onbekend")}</span>
              <span class="tag tagAccent">${escapeHtml(dateLabel)}</span>
            </div>
            <h2 class="title">${title}</h2>
            <div class="details">
              <div class="detail"><span>Datum</span><span>${escapeHtml(prettyDate(event.date))}${event.time ? ` - ${escapeHtml(event.time)}` : ""}</span></div>
              <div class="detail"><span>Plaats</span><span>${escapeHtml(event.location || "Locatie onbekend")}</span></div>
              <div class="detail"><span>Type</span><span>${escapeHtml(event.type || "Type onbekend")}</span></div>
              <div class="detail"><span>Prijs</span><span>${escapeHtml(event.cost || "Zie website")}</span></div>
            </div>
            <p class="desc">${escapeHtml(event.description || "Geen omschrijving beschikbaar.")}</p>
            <div class="cardActions">
              ${website ? `<a class="btn btnPrimary" href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">Meer info</a>` : ""}
              ${route ? `<a class="btn btnSecondary" href="${escapeHtml(route)}" target="_blank" rel="noopener noreferrer">Route</a>` : ""}
            </div>
          </div>
        </article>
      `;
    }

    async function loadWeather() {
      const region = $("region").value.trim();
      if (!region || !dateFrom || !dateTo) return;

      try {
        const url = `${WORKER_URL}/weather?region=${encodeURIComponent(region)}&from=${dateFrom}&to=${dateTo}`;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("Weer niet beschikbaar");
        const data = await response.json();
        if (!data || !data.ok) throw new Error("Weer niet beschikbaar");

        $("weatherBox").innerHTML = [
          `${escapeHtml(data.summary)} (${escapeHtml(data.days)} dagen)`,
          `${escapeHtml(data.tempMin)} graden - ${escapeHtml(data.tempMax)} graden`,
          `Regen ${escapeHtml(data.rainChance)}%`,
          `${escapeHtml(data.rainTotalMM)} mm`,
          `Wind ${escapeHtml(data.windMax)} km/u`,
          `UV ${escapeHtml(data.uvMax)}`
        ].map((item) => `<span class="pill">${item}</span>`).join("");
      } catch {
        $("weatherBox").innerHTML = "";
      }
    }

    async function refreshEvents() {
      const button = $("refreshBtn");
      setBusy(button, true, "Bezig...");
      showStatus("Nieuwe evenementen ophalen...", "warn");

      const selectedSites = [...document.querySelectorAll(".siteCheck:checked")].map((check) => check.value);
      const category = $("typeFilter").value === "all" ? "" : $("typeFilter").value;
      const payload = {
        region: $("region").value.trim(),
        radius: $("radius").value,
        query: $("search").value.trim(),
        category,
        dateFrom,
        dateTo,
        minResults: 20,
        sites: selectedSites,
        providers: {
          perplexity: $("provPerplexity").checked,
          mistral: $("provMistral").checked,
          openai: $("provOpenAI").checked
        }
      };

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Verversen is mislukt");

        showStatus(`Klaar. ${data.scrapedCount || 0} nieuwe resultaten gevonden. De lijst wordt zo opnieuw geladen.`, "ok");
        setTimeout(loadAll, 7000);
      } catch (error) {
        showStatus(`Starten mislukt: ${error.message}`, "error");
      } finally {
        setBusy(button, false);
      }
    }

    async function clearAllEvents() {
      if (!confirm("Weet je zeker dat je alle evenementen wilt verwijderen?")) return;

      const button = $("clearBtn");
      setBusy(button, true, "Verwijderen...");
      showStatus("Evenementen verwijderen...", "warn");

      try {
        const response = await fetch(`${WORKER_URL}/clear`, { method: "POST" });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Verwijderen is mislukt");

        showStatus("Alle evenementen zijn verwijderd. De lijst wordt zo opnieuw geladen.", "ok");
        setTimeout(loadAll, 7000);
      } catch (error) {
        showStatus(`Verwijderen mislukt: ${error.message}`, "error");
      } finally {
        setBusy(button, false);
      }
    }

    function resetFilters() {
      $("search").value = "";
      $("region").value = "Groningen";
      $("radius").value = "100";
      $("periodMode").value = "week";
      $("typeFilter").value = "all";
      $("provPerplexity").checked = true;
      $("provMistral").checked = true;
      $("provOpenAI").checked = false;
      document.querySelectorAll(".siteCheck").forEach((check) => { check.checked = true; });
      updateSiteCount();
      const today = formatDate(new Date());
      $("dateSingle").value = today;
      applyFilters();
      loadWeather();
      hideStatus();
    }

    async function loadAll() {
      updateDateRange();
      [events, sites] = await Promise.all([
        loadJson("./events.json", fallbackEvents),
        loadJson("./sites.json", [])
      ]);

      fillTypes();
      renderSites();
      applyFilters();
      loadWeather();
    }

    controls.forEach((id) => {
      $(id).addEventListener("input", () => {
        applyFilters();
        if (id === "region" || id === "dateSingle" || id === "periodMode") loadWeather();
      });
      $(id).addEventListener("change", () => {
        applyFilters();
        if (id === "region" || id === "dateSingle" || id === "periodMode") loadWeather();
      });
    });

    $("refreshBtn").addEventListener("click", refreshEvents);
    $("resetBtn").addEventListener("click", resetFilters);
    $("clearBtn").addEventListener("click", clearAllEvents);
    $("prevPage").addEventListener("click", () => { currentPage -= 1; render(); window.scrollTo({ top: 0, behavior: "smooth" }); });
    $("nextPage").addEventListener("click", () => { currentPage += 1; render(); window.scrollTo({ top: 0, behavior: "smooth" }); });
    $("allSitesBtn").addEventListener("click", () => { document.querySelectorAll(".siteCheck").forEach((check) => { check.checked = true; }); updateSiteCount(); });
    $("noSitesBtn").addEventListener("click", () => { document.querySelectorAll(".siteCheck").forEach((check) => { check.checked = false; }); updateSiteCount(); });
    $("sitesList").addEventListener("change", updateSiteCount);
    $("siteButton").addEventListener("click", () => {
      const select = $("siteSelect");
      const isOpen = select.classList.toggle("open");
      $("siteButton").setAttribute("aria-expanded", String(isOpen));
    });
    document.addEventListener("click", (event) => {
      if (!$("siteSelect").contains(event.target)) {
        $("siteSelect").classList.remove("open");
        $("siteButton").setAttribute("aria-expanded", "false");
      }
    });

    const today = formatDate(new Date());
    $("dateSingle").value = today;
    loadAll();
  </script>
</body>
</html>
