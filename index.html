<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evenementen</title>

  <style>
    :root{
      --bg:#f3f8ff;
      --surface:#ffffff;
      --surface-2:#eef5ff;
      --primary:#1d4ed8;
      --primary-dark:#163ea7;
      --text:#10233e;
      --muted:#61738c;
      --border:#d8e5ff;
      --shadow:0 10px 30px rgba(29,78,216,.12);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:linear-gradient(180deg,#eff5ff 0%,#f8fbff 100%);
      color:var(--text);
    }

    .header{
      padding:18px 14px 14px;
      color:#fff;
      position:relative;
      overflow:hidden;
      border-bottom:1px solid rgba(255,255,255,0.15);
    }

    .header::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,#0f2d6b 0%,#2563eb 100%);
      z-index:-2;
    }

    .header::after{
      content:"";
      position:absolute;
      inset:0;
      opacity:0.30;
      background-size:cover;
      background-position:center;
      z-index:-1;
    }

    .header.sunny::after{
      background-image:url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1600&q=80");
      opacity:0.35;
    }
    .header.cloudy::after{
      background-image:url("https://images.unsplash.com/photo-1526679492918-6e1d6b7f3f9b?auto=format&fit=crop&w=1600&q=80");
      opacity:0.35;
    }
    .header.rainy::after{
      background-image:url("https://images.unsplash.com/photo-1501696461441-2f7f9c3d5f46?auto=format&fit=crop&w=1600&q=80");
      opacity:0.45;
    }
    .header.snowy::after{
      background-image:url("https://images.unsplash.com/photo-1547756536-cde3673fa2a5?auto=format&fit=crop&w=1600&q=80");
      opacity:0.45;
    }

    .wrap{max-width:1180px;margin:0 auto}

    .headerTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .header h1{
      margin:0;
      font-size:clamp(1.4rem,2.4vw,2rem);
      line-height:1.1;
    }

    .header p{
      margin:6px 0 0;
      color:#dce8ff;
      max-width:760px;
      font-size:13px;
      font-weight:800;
    }

    .weatherBox{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      align-items:center;
      justify-content:flex-end;
      margin-top:2px;
    }

    .weatherBadge{
      background:rgba(255,255,255,0.16);
      border:1px solid rgba(255,255,255,0.35);
      padding:6px 9px;
      border-radius:999px;
      font-size:12px;
      backdrop-filter: blur(10px);
      font-weight:900;
      color:#fff;
      white-space:nowrap;
    }

    .container{
      max-width:1180px;
      margin:12px auto 0;
      padding:0 14px 40px;
    }

    .toolbar{
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(10px);
      padding:16px;
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
    }

    .filters{
      display:grid;
      grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr auto;
      gap:12px;
      align-items:end;
    }

    .field label{
      display:block;
      margin-bottom:5px;
      font-weight:900;
      color:var(--primary-dark);
      font-size:13px;
    }

    .field input,.field select{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      font-size:14px;
      color:var(--text);
      font-weight:700;
    }

    .rowCompact{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      padding-top:12px;
    }

    .providers{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--primary-dark);
      font-weight:900;
    }

    .providers label{
      display:flex;
      gap:6px;
      align-items:center;
      background:var(--surface-2);
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      cursor:pointer;
      user-select:none;
    }

    .dropdown {
      position: relative;
      min-width: 280px;
      flex: 1;
      max-width:420px;
    }

    .dropdown-btn {
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-weight: 900;
      color: var(--primary-dark);
      font-size: 13px;
    }

    .dropdown-panel {
      display: none;
      position: absolute;
      z-index: 999;
      top: 44px;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .dropdown-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      color: var(--primary-dark);
      font-size:13px;
    }

    .dropdown-panel label:hover {
      background: var(--surface-2);
    }

    .dropdown-actions {
      display:flex;
      gap:8px;
      padding-top:10px;
      flex-wrap:wrap;
    }

    .smallbtn{
      padding:7px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--surface-2);
      cursor:pointer;
      font-weight:900;
      color:var(--primary-dark);
      font-size:12px;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin:16px 2px;
    }

    .meta strong{color:var(--primary-dark)}
    .meta span{color:var(--muted);font-size:13px}

    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .18s ease,box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 34px rgba(29,78,216,.18);
    }

    .image{
      height:150px;
      background-size:cover;
      background-position:center;
      background-color:#e9f0ff;
    }

    .content{padding:14px}

    .source{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:var(--surface-2);
      color:var(--primary-dark);
      font-size:12px;
      font-weight:900;
      margin-bottom:10px;
    }

    .period{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#eaf2ff;
      color:#0f2d6b;
      font-size:12px;
      font-weight:900;
      margin-bottom:10px;
      margin-left:6px;
    }

    .title{
      margin:0 0 8px;
      font-size:1.02rem;
      color:#0d2350;
    }

    .meta-list{
      display:grid;
      gap:6px;
      font-size:13px;
      color:#29415f;
      font-weight:800;
    }

    .desc{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      min-height:52px;
      margin:12px 0;
      font-weight:700;
    }

    .links{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:11px 13px;
      border-radius:12px;
      text-decoration:none;
      font-weight:900;
      font-size:13px;
      border:none;
      cursor:pointer;
    }

    .btn-primary{background:var(--primary);color:#fff}
    .btn-secondary{background:var(--surface-2);color:var(--primary-dark)}
    .btn-danger{background:#b91c1c;color:#fff}

    .notice{
      margin-top:12px;
      padding:12px 14px;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:14px;
      color:var(--muted);
      font-size:13px;
      display:none;
      font-weight:800;
    }

    @media (max-width:1200px){
      .filters{grid-template-columns:1fr 1fr 1fr}
      .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width:900px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width:760px){
      .filters{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
      .dropdown{min-width:100%}
      .headerTop{flex-direction:column}
      .weatherBox{justify-content:flex-start}
    }
  </style>
</head>

<body>
<header class="header" id="pageHeader">
  <div class="wrap">
    <div class="headerTop">
      <div>
        <h1 id="pageTitle">Evenementen</h1>
        <p id="pageSubtitle">Evenementen overzicht</p>
      </div>

      <div class="weatherBox" id="weatherBox" style="display:none;">
        <div class="weatherBadge" id="weatherSummary">🌤️ ...</div>
        <div class="weatherBadge" id="weatherTemp">🌡️ ...</div>
        <div class="weatherBadge" id="weatherRainChance">🌧️ ...</div>
        <div class="weatherBadge" id="weatherRainMM">💧 ...</div>
        <div class="weatherBadge" id="weatherWind">💨 ...</div>
        <div class="weatherBadge" id="weatherUV">☀️ UV ...</div>
      </div>
    </div>
  </div>
</header>

<main class="container">
  <section class="toolbar">

    <div class="filters">
      <div class="field">
        <label for="search">Zoeken</label>
        <input id="search" placeholder="Omschrijving (optioneel)" oninput="applyFilters()">
      </div>

      <div class="field">
        <label for="region">Regio</label>
        <input id="region" value="Groningen" oninput="applyFilters(); updateDateRange(); loadWeather();">
      </div>

      <div class="field">
        <label for="radius">Straal (km)</label>
        <input id="radius" type="number" min="1" max="300" value="100">
      </div>

      <div class="field">
        <label for="typeFilter">Evenementen</label>
        <select id="typeFilter" onchange="applyFilters()">
          <option value="all">Alle types</option>
        </select>
      </div>

      <div class="field">
        <label for="dateSingle">Datum</label>
        <input id="dateSingle" type="date" onchange="updateDateRange(); applyFilters(); loadWeather();">
      </div>

      <div class="field">
        <label for="periodMode">Periode</label>
        <select id="periodMode" onchange="updateDateRange(); applyFilters(); loadWeather();">
          <option value="day">Alleen deze dag</option>
          <option value="thisWeekend" selected>Dit weekend</option>
          <option value="nextWeekend">Volgend weekend</option>
          <option value="week">7 dagen</option>
        </select>
      </div>

      <button class="btn btn-primary" id="refreshBtn" onclick="triggerRemoteRefresh()">Ververs</button>
    </div>

    <div class="rowCompact">
      <div class="providers">
        <label><input type="checkbox" id="provPerplexity" checked> Perplexity</label>
        <label><input type="checkbox" id="provMistral" checked> Mistral</label>
        <label><input type="checkbox" id="provOpenAI"> OpenAI</label>
      </div>

      <div class="dropdown" id="sitesDropdown">
        <button class="dropdown-btn" onclick="toggleDropdown(event)">
          Websites (<span id="siteCount">0</span>)
        </button>

        <div class="dropdown-panel" id="dropdownPanel">
          <div id="sitesList"></div>

          <div class="dropdown-actions">
            <button class="smallbtn" onclick="selectAllSites()">Alles</button>
            <button class="smallbtn" onclick="selectNoneSites()">Geen</button>
          </div>
        </div>
      </div>

      <button class="btn btn-danger" onclick="clearAllEvents()">Alles verwijderen</button>
    </div>

    <div class="notice" id="status"></div>
  </section>

  <div class="meta">
    <strong id="count">0 evenementen</strong>
    <span id="metaInfo">Resultaten worden geladen uit events.json</span>
  </div>

  <section class="grid" id="grid"></section>
</main>

<script>
  let events = [];
  let availableSites = [];

  const WORKER_URL = "https://evenementen-refresh.mrsjonnie.workers.dev";

  function formatDate(d){
    return d.toISOString().slice(0,10);
  }

  function getWeekendRange(offsetWeeks = 0){
    const today = new Date();
    today.setHours(0,0,0,0);
    today.setDate(today.getDate() + (offsetWeeks * 7));

    const day = today.getDay();

    const friday = new Date(today);
    const diffToFriday = (5 - day + 7) % 7;
    friday.setDate(today.getDate() + diffToFriday);

    const sunday = new Date(friday);
    sunday.setDate(friday.getDate() + 2);

    return { from: formatDate(friday), to: formatDate(sunday) };
  }

  function updateDateRange(){
    const mode = document.getElementById("periodMode").value;
    const baseDate = document.getElementById("dateSingle").value;

    if(mode === "thisWeekend"){
      const r = getWeekendRange(0);
      window.dateFrom = r.from;
      window.dateTo = r.to;
      return;
    }

    if(mode === "nextWeekend"){
      const r = getWeekendRange(1);
      window.dateFrom = r.from;
      window.dateTo = r.to;
      return;
    }

    if(!baseDate){
      const r = getWeekendRange(0);
      window.dateFrom = r.from;
      window.dateTo = r.to;
      return;
    }

    const d = new Date(baseDate + "T00:00:00");

    if(mode === "day"){
      window.dateFrom = baseDate;
      window.dateTo = baseDate;
    }

    if(mode === "week"){
      const to = new Date(d);
      to.setDate(d.getDate() + 6);
      window.dateFrom = baseDate;
      window.dateTo = formatDate(to);
    }
  }

  function updateHeaderText(){
    const region = document.getElementById("region").value.trim() || "Onbekend";
    document.getElementById("pageTitle").textContent = `Evenementen rond ${region}`;
    document.getElementById("pageSubtitle").textContent = `Periode: ${window.dateFrom} t/m ${window.dateTo}`;
    document.title = `Evenementen rond ${region}`;
  }

  function fillTypes(items){
    const typeSelect = document.getElementById("typeFilter");
    const current = typeSelect.value || "all";

    const types = [...new Set(items.map(e => (e.type || "").trim()).filter(Boolean))].sort();

    typeSelect.innerHTML =
      '<option value="all">Alle types</option>' +
      types.map(v => `<option value="${v.toLowerCase()}">${v}</option>`).join("");

    if([...typeSelect.options].some(o => o.value === current)){
      typeSelect.value = current;
    }
  }

  async function loadData(){
    const res = await fetch("./events.json?_=" + Date.now(), { cache: "no-store" });
    if(!res.ok) throw new Error("events.json kon niet worden geladen");

    events = await res.json();
    if(!Array.isArray(events)) events = [];

    fillTypes(events);
    applyFilters();
  }

  function render(items){
    document.getElementById("count").textContent = `${items.length} evenementen`;

    document.getElementById("grid").innerHTML = items.map(e => {
      const label = e.periodLabel || e.date || "";

      return `
        <article class="card">
          <div class="image" style="background-image:url('${e.image || ""}')"></div>
          <div class="content">
            <div>
              <span class="source">${e.source || "Bron onbekend"}</span>
              ${label ? `<span class="period">${label}</span>` : ""}
            </div>

            <h2 class="title">${e.title || ""}</h2>

            <div class="meta-list">
              <div>📅 ${e.date || "Onbekend"} ${e.time || ""}</div>
              <div>📍 ${e.location || "Onbekend"}</div>
              <div>🏷️ ${e.type || "Onbekend"}</div>
              <div>💶 ${e.cost || "Zie website"}</div>
            </div>

            <p class="desc">${e.description || ""}</p>

            <div class="links">
              <a class="btn btn-primary" href="${e.website || "#"}" target="_blank" rel="noopener noreferrer">
                Meer info
              </a>
              ${e.locationLink ? `
                <a class="btn btn-secondary" href="${e.locationLink}" target="_blank" rel="noopener noreferrer">
                  Route
                </a>
              ` : ""}
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function isWithinDateRange(eventDate, from, to){
    if(!eventDate) return true;
    if(!eventDate.match(/^\d{4}-\d{2}-\d{2}$/)) return true;

    const d = new Date(eventDate);
    const f = new Date(from);
    const t = new Date(to);

    d.setHours(0,0,0,0);
    f.setHours(0,0,0,0);
    t.setHours(0,0,0,0);

    return d >= f && d <= t;
  }

  function applyFilters(){
    updateHeaderText();

    const q = document.getElementById("search").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;

    const filtered = events.filter(e => {
      const hay = `${e.title || ""} ${e.description || ""} ${e.location || ""}`.toLowerCase();

      if(q && !hay.includes(q)) return false;
      if(type !== "all" && (e.type || "").toLowerCase() !== type) return false;

      if(window.dateFrom && window.dateTo && !isWithinDateRange(e.date, window.dateFrom, window.dateTo)) return false;

      return true;
    });

    document.getElementById("metaInfo").textContent =
      `Periode: ${window.dateFrom} t/m ${window.dateTo}`;

    render(filtered);
  }

  async function loadSites(){
    const res = await fetch("./sites.json?_=" + Date.now(), { cache: "no-store" });
    if(!res.ok) throw new Error("sites.json kon niet worden geladen");

    availableSites = await res.json();
    if(!Array.isArray(availableSites)) availableSites = [];

    renderSitesDropdown();
  }

  function renderSitesDropdown(){
    const container = document.getElementById("sitesList");

    container.innerHTML = availableSites.map(site => {
      return `
        <label>
          <input class="siteCheck" type="checkbox" value="${site}" checked onchange="updateSiteCount()">
          ${site}
        </label>
      `;
    }).join("");

    updateSiteCount();
  }

  function updateSiteCount(){
    const selected = document.querySelectorAll(".siteCheck:checked").length;
    document.getElementById("siteCount").textContent = selected;
  }

  function toggleDropdown(e){
    e.preventDefault();
    const panel = document.getElementById("dropdownPanel");
    panel.style.display = (panel.style.display === "block") ? "none" : "block";
  }

  function selectAllSites(){
    document.querySelectorAll(".siteCheck").forEach(cb => cb.checked = true);
    updateSiteCount();
  }

  function selectNoneSites(){
    document.querySelectorAll(".siteCheck").forEach(cb => cb.checked = false);
    updateSiteCount();
  }

  document.addEventListener("click", (e) => {
    const dropdown = document.getElementById("sitesDropdown");
    const panel = document.getElementById("dropdownPanel");

    if(!dropdown.contains(e.target)){
      panel.style.display = "none";
    }
  });

  function weatherClassFromCode(code){
    if(code === 0) return "sunny";
    if([1,2,3,45,48].includes(code)) return "cloudy";
    if([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code)) return "rainy";
    if([71,73,75,77,85,86].includes(code)) return "snowy";
    return "cloudy";
  }

  async function loadWeather(){
    const region = document.getElementById("region").value.trim();
    if(!region || !window.dateFrom || !window.dateTo) return;

    try{
      const url = `${WORKER_URL}/weather?region=${encodeURIComponent(region)}&from=${window.dateFrom}&to=${window.dateTo}`;
      const res = await fetch(url, { cache:"no-store" });
      if(!res.ok) return;

      const data = await res.json();
      if(!data || !data.ok) return;

      document.getElementById("weatherBox").style.display = "flex";

      document.getElementById("weatherSummary").textContent =
        `🌤️ ${data.summary} (${data.days} dagen)`;

      document.getElementById("weatherTemp").textContent =
        `🌡️ ${data.tempMin}°C - ${data.tempMax}°C`;

      document.getElementById("weatherRainChance").textContent =
        `🌧️ Regen kans: ${data.rainChance}%`;

      document.getElementById("weatherRainMM").textContent =
        `💧 Regen: ${data.rainTotalMM}mm`;

      document.getElementById("weatherWind").textContent =
        `💨 Wind max: ${data.windMax} km/u`;

      document.getElementById("weatherUV").textContent =
        `☀️ UV max: ${data.uvMax}`;

      const header = document.getElementById("pageHeader");
      header.classList.remove("sunny","cloudy","rainy","snowy");
      header.classList.add(weatherClassFromCode(data.weatherCode));

    } catch(e){
      // stil falen
    }
  }

  async function triggerRemoteRefresh(){
    const btn = document.getElementById("refreshBtn");
    const status = document.getElementById("status");

    status.style.display = "block";
    btn.disabled = true;
    btn.textContent = "Bezig...";
    status.textContent = "Nieuwe events ophalen...";

    const sites = [];
    document.querySelectorAll(".siteCheck:checked").forEach(cb => sites.push(cb.value));

    let category = document.getElementById("typeFilter").value;
    if(category === "all") category = "";

    const payload = {
      region: document.getElementById("region").value.trim(),
      radius: document.getElementById("radius").value,
      query: document.getElementById("search").value.trim(),
      category: category,
      dateFrom: window.dateFrom,
      dateTo: window.dateTo,
      minResults: 20,
      sites: sites,
      providers: {
        perplexity: document.getElementById("provPerplexity").checked,
        mistral: document.getElementById("provMistral").checked,
        openai: document.getElementById("provOpenAI").checked
      }
    };

    try{
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "Onbekende fout");

      status.textContent =
        `Klaar! ${data.scrapedCount} nieuwe gevonden. Totaal opgeslagen: ${data.totalSaved}.`;

      setTimeout(async () => {
        status.textContent = "Nieuwe events.json laden...";
        await loadData();
        status.textContent = "Nieuwe events zijn geladen!";
      }, 7000);

    } catch(e){
      status.textContent = "Starten mislukt: " + e.message;
    }

    btn.disabled = false;
    btn.textContent = "Ververs";
  }

  async function clearAllEvents(){
    if(!confirm("Weet je zeker dat je ALLE events wilt verwijderen?")) return;

    const status = document.getElementById("status");
    status.style.display = "block";
    status.textContent = "Events verwijderen...";

    try{
      const res = await fetch(WORKER_URL + "/clear", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({})
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "Onbekende fout");

      status.textContent = "Alle events zijn verwijderd. Even wachten op GitHub Pages...";

      setTimeout(async () => {
        await loadData();
        status.textContent = "Events.json opnieuw geladen (leeg).";
      }, 7000);

    } catch(e){
      status.textContent = "Verwijderen mislukt: " + e.message;
    }
  }

  // defaults
  const r = getWeekendRange(0);
  window.dateFrom = r.from;
  window.dateTo = r.to;

  document.getElementById("dateSingle").value = r.from;
  document.getElementById("periodMode").value = "thisWeekend";

  Promise.all([loadSites(), loadData()]).then(() => {
    updateDateRange();
    applyFilters();
    loadWeather();
  }).catch((e) => {
    const status = document.getElementById("status");
    status.style.display = "block";
    status.textContent = "Laden mislukt: " + e.message;
  });
</script>

</body>
</html>
